services:
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_ORIGIN: http://backend:3001
    environment:
      NEXT_PUBLIC_API_BASE_PATH: /api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    environment:
      BIND_ADDR: 0.0.0.0:3001
      DATABASE_URL: postgres://horsefarm:horsefarm@db:5432/horsefarm
      PUBLIC_BASE_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      RUST_LOG: info
    ports:
      - "3001:3001"
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: horsefarm
      POSTGRES_USER: horsefarm
      POSTGRES_PASSWORD: horsefarm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
